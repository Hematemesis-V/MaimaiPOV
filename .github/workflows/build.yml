name: Build TrollStore IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: |
          brew install xcodegen
          brew install ldid
          
      - name: Generate Xcode Project
        run: xcodegen generate
        
      - name: Build Unsigned App
        run: |
          xcodebuild build \
            -project MaimaiPOV.xcodeproj \
            -scheme MaimaiPOV \
            -configuration Release \
            -sdk iphoneos \
            CONFIGURATION_BUILD_DIR=build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
            
      - name: Package IPA with ldid (TrollStore)
        run: |
          mkdir -p Payload
          cp -r build/MaimaiPOV.app Payload/
          ldid -S Payload/MaimaiPOV.app
          zip -r MaimaiPOV.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MaimaiPOV-TrollStore
          path: MaimaiPOV.ipa